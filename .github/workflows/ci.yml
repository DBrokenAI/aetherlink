name: CI

# Build + test on every supported platform on every push and PR.
# This is the regression net that catches Windows-only path bugs,
# Linux case-sensitivity bugs, and macOS frame_dependency issues
# before they reach a user.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        toolchain: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # tray-icon / tao pull in GTK on Linux. Without these the build
      # fails with linker errors that look like portability bugs but
      # are really missing system packages.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo build (release)
        run: cargo build --release --verbose

      - name: cargo test
        run: cargo test --all --verbose

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
